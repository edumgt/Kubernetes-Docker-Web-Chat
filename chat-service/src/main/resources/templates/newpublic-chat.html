<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Chat - Real Time Chat Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"Space Grotesk"', 'sans-serif']
          },
          colors: {
            tide: '#0f766e',
            ember: '#ea580c'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="font-body min-h-screen bg-[radial-gradient(circle_at_top,_#ecfeff_0%,_#f8fafc_45%,_#fff7ed_100%)] text-slate-900">
<div class="relative min-h-screen overflow-x-hidden">
  <div class="pointer-events-none absolute -left-20 top-20 h-56 w-56 rounded-full bg-ember/20 blur-3xl"></div>
  <div class="pointer-events-none absolute right-0 top-1/3 h-72 w-72 rounded-full bg-tide/20 blur-3xl"></div>

  <header class="relative border-b border-slate-200/60 bg-white/70 backdrop-blur">
    <nav class="mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-8">
      <a href="/chat" class="font-display text-2xl text-slate-900">Realtime Chat</a>
      <div class="flex flex-wrap items-center gap-2">
        <a href="/chat" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Direct Messages</a>
        <a href="/profile" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Profile</a>
        <a href="/auth/logout" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">Logout</a>
      </div>
    </nav>
  </header>

  <main class="relative mx-auto w-full max-w-6xl px-4 py-8 sm:px-8 sm:py-10">
    <section class="rounded-3xl border border-white/70 bg-white/85 p-4 shadow-xl shadow-slate-300/40 backdrop-blur sm:p-6">
      <div class="mb-4 flex items-center justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.13em] text-tide">Open Room</p>
          <h1 class="font-display text-3xl text-slate-900">Public Chat</h1>
        </div>
        <span id="connectionBadge" class="rounded-full bg-slate-200 px-3 py-1 text-xs font-semibold text-slate-700">Connecting...</span>
      </div>

      <div id="chat" class="h-[56vh] min-h-[360px] space-y-3 overflow-y-auto rounded-2xl border border-slate-200 bg-slate-50 p-4"></div>

      <div class="mt-4 flex gap-2">
        <input
                type="text"
                id="messageInput"
                placeholder="Type your message..."
                class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-tide/70 focus:ring-2 focus:ring-tide/20"
        >
        <button id="sendMessage" class="rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50">
          Send
        </button>
      </div>
    </section>
  </main>
</div>

<script th:inline="javascript">
  const DEFAULT_IMG = "https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg";
  const sender = /*[[${username}]]*/ "Guest";
  let stompClient = null;

  function setConnected(connected) {
    document.getElementById("sendMessage").disabled = !connected;
    const badge = document.getElementById("connectionBadge");
    if (connected) {
      badge.textContent = "Connected";
      badge.className = "rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700";
    } else {
      badge.textContent = "Offline";
      badge.className = "rounded-full bg-rose-100 px-3 py-1 text-xs font-semibold text-rose-700";
    }
  }

  function connect() {
    const socket = new SockJS("/chat");
    stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {
      setConnected(true);
      stompClient.subscribe('/topic/messages', function (message) {
        showMessage(JSON.parse(message.body));
      });
      loadChatHistory();
    }, function () {
      setConnected(false);
    });
  }

  function sendMessage() {
    const content = document.getElementById("messageInput").value.trim();
    if (!content || !stompClient) return;

    const chatMessage = {
      sender: sender,
      content: content
    };

    stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));
    document.getElementById("messageInput").value = '';
  }

  document.getElementById("sendMessage").onclick = sendMessage;
  document.getElementById("messageInput").addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      sendMessage();
    }
  });

  function loadChatHistory() {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    fetch('/chat/messages')
            .then(response => response.json())
            .then(data => {
              data.forEach(showMessage);
            })
            .catch(error => console.error("Error loading chat history: ", error));
  }

  const profileCache = {};

  function showMessage(message) {
    const email = message.sender;

    if (profileCache[email]) {
      const profile = profileCache[email];
      renderPublicMessage(
              profile.displayName || email,
              profile.profilePicUrl || DEFAULT_IMG,
              message.content,
              message.timestamp
      );
    } else {
      fetch('/profile/' + encodeURIComponent(email))
              .then(resp => {
                if (!resp.ok) throw new Error("No profile");
                return resp.json();
              })
              .then(profile => {
                profileCache[email] = profile;
                renderPublicMessage(
                        profile.displayName || email,
                        profile.profilePicUrl || DEFAULT_IMG,
                        message.content,
                        message.timestamp
                );
              })
              .catch(() => {
                profileCache[email] = {};
                renderPublicMessage(
                        email,
                        DEFAULT_IMG,
                        message.content,
                        message.timestamp
                );
              });
    }
  }

  function renderPublicMessage(name, imgUrl, content, timestamp) {
    const chat = document.getElementById("chat");

    const wrapper = document.createElement("div");
    wrapper.className = "flex items-start gap-3 rounded-2xl border border-slate-200 bg-white px-3 py-3 shadow-sm";

    const img = document.createElement("img");
    img.src = imgUrl;
    img.alt = "Profile";
    img.className = "h-10 w-10 rounded-xl object-cover";

    const contentDiv = document.createElement("div");
    contentDiv.className = "min-w-0 flex-1";

    const textElem = document.createElement("p");
    textElem.className = "break-words text-sm text-slate-800";
    textElem.textContent = content;

    const meta = document.createElement("p");
    meta.className = "mt-1 text-xs text-slate-500";
    const formatted = timestamp ? new Date(timestamp).toLocaleString() : "just now";
    meta.textContent = name + " • " + formatted;

    contentDiv.appendChild(textElem);
    contentDiv.appendChild(meta);

    wrapper.appendChild(img);
    wrapper.appendChild(contentDiv);

    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  window.onload = connect;
</script>
</body>
</html>
