<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chat - Real Time Chat Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"Space Grotesk"', 'sans-serif']
          },
          colors: {
            tide: '#0f766e',
            ember: '#ea580c'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="font-body min-h-screen bg-[radial-gradient(circle_at_top,_#fff7ed_0%,_#f8fafc_45%,_#ecfeff_100%)] text-slate-900">
<div class="relative min-h-screen overflow-x-hidden">
  <div class="pointer-events-none absolute -left-20 top-20 h-56 w-56 rounded-full bg-ember/20 blur-3xl"></div>
  <div class="pointer-events-none absolute right-0 top-1/3 h-72 w-72 rounded-full bg-tide/20 blur-3xl"></div>

  <header class="relative border-b border-slate-200/60 bg-white/70 backdrop-blur">
    <nav class="mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-8">
      <a href="/chat" class="font-display text-2xl text-slate-900">Realtime Chat</a>
      <div class="flex flex-wrap items-center gap-2">
        <a href="/chat" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Direct Messages</a>
        <a href="/chat/public" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Public Room</a>
        <a href="/profile" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Profile</a>
        <a href="/auth/logout" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">Logout</a>
      </div>
    </nav>
  </header>

  <main class="relative mx-auto w-full max-w-6xl px-4 py-8 sm:px-8 sm:py-10">
    <section class="rounded-3xl border border-white/70 bg-white/85 p-4 shadow-xl shadow-slate-300/40 backdrop-blur sm:p-6">
      <div class="mb-4 flex flex-wrap items-end justify-between gap-3">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.13em] text-tide">Private Room</p>
          <h1 class="font-display text-3xl text-slate-900" id="chatTitle">Private Chat</h1>
        </div>
        <div class="flex items-center gap-2">
          <p class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600" id="readStatus">Read status pending</p>
          <p class="rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold text-white" id="recipientBadge">Connecting...</p>
        </div>
      </div>

      <div id="chat" class="h-[56vh] min-h-[360px] overflow-y-auto rounded-2xl border border-slate-200 bg-slate-50 p-4">
        <ul id="privateMessages" class="space-y-3"></ul>
      </div>

      <div class="mt-4 flex gap-2">
        <input
                type="text"
                id="privateMessage"
                placeholder="Type a message..."
                class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-tide/70 focus:ring-2 focus:ring-tide/20"
        >
        <button id="sendPrivateButton" class="rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
          Send
        </button>
      </div>
    </section>
  </main>
</div>

<script th:inline="javascript">
  var username = /*[[${username}]]*/ "User";
  var recipient = /*[[${recipient}]]*/ "recipient@example.com";
  var conversation_id = /*[[${conversation_id}]]*/ "null";
  var sender_displayname = /*[[${sender_displayname}]]*/ "null";
  var recipient_displayname = /*[[${recipient_displayname}]]*/ "null";
  var sender_profilepic = /*[[${sender_profilepic}]]*/ "null";
  var recipient_profilepic = /*[[${recipient_profilepic}]]*/ "null";
  var stompClient = null;
  const DEFAULT_IMG = "https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg";

  document.getElementById("chatTitle").textContent = "Chat with " + (recipient_displayname !== "null" ? recipient_displayname : recipient);
  document.getElementById("recipientBadge").textContent = recipient;

  window.onload = connect;

  function connect() {
    var socket = new SockJS('/chat');
    stompClient = Stomp.over(socket);
    stompClient.connect({}, function() {
      stompClient.subscribe('/user/queue/private/' + conversation_id, function(message) {
        showPrivateMessage(JSON.parse(message.body));
      });
      stompClient.subscribe('/user/queue/private/' + conversation_id + '/read', function(eventMessage) {
        showReadReceipt(JSON.parse(eventMessage.body));
      });
      loadChatHistory();
      markAsRead();
    });
  }

  function loadChatHistory() {
    fetch('/chat/messages/' + conversation_id)
            .then(response => response.json())
            .then(data => {
              data.forEach(showPrivateMessage);
            })
            .catch(error => console.error("Error loading chat history: ", error));
  }

  function sendPrivateMessage() {
    const content = document.getElementById("privateMessage").value.trim();
    if (!content || !stompClient) return;

    const message = JSON.stringify({
      sender: username,
      recipient: recipient,
      content: content
    });

    stompClient.send("/app/private/chat", {}, message);
    document.getElementById("privateMessage").value = "";
  }

  function markAsRead() {
    fetch('/chat/conversations/' + encodeURIComponent(conversation_id) + '/read', {
      method: 'POST'
    }).catch(error => console.error("Error marking conversation as read:", error));
  }

  function showReadReceipt(event) {
    const readStatus = document.getElementById("readStatus");
    if (!event || !event.reader) {
      return;
    }

    if (event.reader === recipient) {
      const formatted = event.readAt ? new Date(event.readAt).toLocaleString() : "just now";
      readStatus.textContent = "Read by " + (recipient_displayname !== "null" ? recipient_displayname : recipient) + " at " + formatted;
      readStatus.className = "rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700";
      return;
    }

    if (event.reader === username) {
      readStatus.textContent = "You read at " + (event.readAt ? new Date(event.readAt).toLocaleString() : "just now");
      readStatus.className = "rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600";
    }
  }

  document.getElementById("sendPrivateButton").addEventListener("click", sendPrivateMessage);
  document.getElementById("privateMessage").addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      sendPrivateMessage();
    }
  });

  function showPrivateMessage(message) {
    const ul = document.getElementById("privateMessages");
    const li = document.createElement("li");

    const isSender = message.sender === username;
    li.className = isSender ? "flex justify-end" : "flex justify-start";

    const row = document.createElement("div");
    row.className = "flex max-w-[85%] items-end gap-2";
    if (isSender) {
      row.classList.add("flex-row-reverse");
    }

    const name = isSender
            ? (sender_displayname !== "null" ? sender_displayname : username)
            : (recipient_displayname !== "null" ? recipient_displayname : recipient);

    const pic = isSender
            ? (sender_profilepic !== "null" ? sender_profilepic : DEFAULT_IMG)
            : (recipient_profilepic !== "null" ? recipient_profilepic : DEFAULT_IMG);

    const timestamp = message.timestamp ? new Date(message.timestamp).toLocaleString() : "just now";

    const img = document.createElement("img");
    img.src = pic;
    img.alt = "Profile";
    img.className = "h-10 w-10 rounded-xl object-cover";

    const bubble = document.createElement("div");
    bubble.className = isSender
            ? "rounded-2xl rounded-br-sm bg-slate-900 px-4 py-3 text-sm text-white shadow"
            : "rounded-2xl rounded-bl-sm bg-white px-4 py-3 text-sm text-slate-800 shadow";

    const text = document.createElement("p");
    text.className = "break-words";
    text.textContent = message.content;

    const meta = document.createElement("p");
    meta.className = isSender ? "mt-1 text-[11px] text-slate-300" : "mt-1 text-[11px] text-slate-500";
    meta.textContent = name + " • " + timestamp;

    bubble.appendChild(text);
    bubble.appendChild(meta);

    row.appendChild(img);
    row.appendChild(bubble);
    li.appendChild(row);
    ul.appendChild(li);

    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;

    if (message.sender !== username && document.visibilityState === "visible") {
      markAsRead();
    }
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") {
      markAsRead();
    }
  });
</script>
</body>
</html>
