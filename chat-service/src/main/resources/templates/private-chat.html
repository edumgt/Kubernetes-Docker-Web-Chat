<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Private Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<h1>Private Chat</h1>
<p>You are: <span th:text="${username}">User</span></p>
<p>Chatting with: <span th:text="${recipient}">recipient@example.com</span></p>

<div id="chat" style="height:300px; overflow-y:scroll; border:1px solid #ccc;">
    <ul id="privateMessages"></ul>
</div>
<input type="text" id="privateMessage" placeholder="Enter message..." />
<button onclick="sendPrivateMessage()">Send Private Message</button>


<script th:inline="javascript">
    var username = /*[[${username}]]*/ "User";
    var recipient = /*[[${recipient}]]*/ "recipient@example.com";
    var stompClient = null;
    var conversation_id = /*[[${conversation_id}]]*/ "null";
    var sender_displayname = /*[[${sender_displayname}]]*/ "null";
    var recipient_displayname = /*[[${recipient_displayname}]]*/ "null";
    var sender_profilepic = /*[[${sender_profilepic}]]*/ "null";
    var recipient_profilepic = /*[[${recipient_profilepic}]]*/ "null";

    function connect() {
        var socket = new SockJS('/chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function(frame) {
            console.log('Connected: ' + frame);
            // Subscribe to the private queue for messages destined for the logged-in user
            stompClient.subscribe('/user/queue/private/' + conversation_id, function(message) {
                showPrivateMessage(JSON.parse(message.body));
            });

            loadChatHistory();

        });
    }

    function loadChatHistory(){
        fetch('/chat/messages/' + conversation_id)
            .then(response => response.json())
            .then(data => {
                data.forEach(message => {
                    showPrivateMessage(message);
                });
            })
            .catch(error => console.error("Error loading chat history: ", error));
    }

    function sendPrivateMessage() {
        var messageContent = document.getElementById("privateMessage").value;
        var message = JSON.stringify({
            'sender': username,
            'recipient': recipient,
            'content': messageContent
        });

        stompClient.send("/app/private/chat", {}, message);
        document.getElementById("privateMessage").value = "";

    }

    function showPrivateMessage(message) {
        var ul = document.getElementById("privateMessages");
        var li = document.createElement("li");
        li.appendChild(document.createTextNode(message.sender + ": " + message.content));
        ul.appendChild(li);
        var chat = document.getElementById("chat");
        chat.scrollTop = chat.scrollHeight;
    }

    window.onload = connect;
</script>
</body>
</html>
