spring.application.name=chat-service
server.port=8082

server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone = http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true

spring.data.mongodb.uri=mongodb://mongodb-messages:27017/chat-app-messages
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.websocket.redis.enabled=${APP_WEBSOCKET_REDIS_ENABLED:false}
app.websocket.redis.channel=${APP_WEBSOCKET_REDIS_CHANNEL:chat:websocket}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:local-dev-jwt-secret-change-this-please-1234}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:3600000}
app.admin.auth.email=${APP_ADMIN_AUTH_EMAIL:admin@test.com}
app.admin.auth.password=${APP_ADMIN_AUTH_PASSWORD:123456}
app.admin.auth.token-secret=${APP_ADMIN_AUTH_TOKEN_SECRET:chat-admin-secret-change-this-token-key-123456789}
app.admin.auth.token-expiration-ms=${APP_ADMIN_AUTH_TOKEN_EXPIRATION_MS:28800000}
app.admin.k8s.api-server=${APP_ADMIN_K8S_API_SERVER:https://kubernetes.default.svc}
app.admin.k8s.namespace=${APP_ADMIN_K8S_NAMESPACE:chat-app}
app.admin.k8s.token-file=${APP_ADMIN_K8S_TOKEN_FILE:/var/run/secrets/kubernetes.io/serviceaccount/token}
app.admin.k8s.ca-file=${APP_ADMIN_K8S_CA_FILE:/var/run/secrets/kubernetes.io/serviceaccount/ca.crt}
app.admin.k8s.bearer-token=${APP_ADMIN_K8S_BEARER_TOKEN:}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
