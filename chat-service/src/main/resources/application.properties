spring.application.name=chat-service
server.port=8082

server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone = http://eureka-server:8761/eureka

spring.data.mongodb.uri=mongodb://mongodb-messages:27017/chat-app-messages
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.websocket.redis.enabled=${APP_WEBSOCKET_REDIS_ENABLED:false}
app.websocket.redis.channel=${APP_WEBSOCKET_REDIS_CHANNEL:chat:websocket}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
