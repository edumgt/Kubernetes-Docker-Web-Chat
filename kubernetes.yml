---
# Profile-Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
