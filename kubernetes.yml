---
# MongoDB for Profiles - PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-profiles-pvc
  namespace: chat-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# MongoDB for Profiles Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-profiles
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-profiles
  template:
    metadata:
      labels:
        app: mongodb-profiles
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: chat-app-profiles
          volumeMounts:
            - name: storage
              mountPath: /data/db
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: mongodb-profiles-pvc
---
# MongoDB for Profiles Service
apiVersion: v1
kind: Service
metadata:
  name: mongodb-profiles
  namespace: chat-app
spec:
  selector:
    app: mongodb-profiles
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017

