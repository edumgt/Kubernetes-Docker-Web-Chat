apiVersion: v1
kind: Namespace
metadata:
  name: chat-app

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-service-admin-reader
  namespace: chat-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chat-service-k8s-read
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chat-service-k8s-read-binding
subjects:
  - kind: ServiceAccount
    name: chat-service-admin-reader
    namespace: chat-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chat-service-k8s-read

---
# Eureka Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: chat-app-eureka-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_APPLICATION_NAME
              value: eureka-server
---
# Eureka Server Service
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: chat-app
spec:
  selector:
    app: eureka-server
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: chat-app-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9999
---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: chat-app
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 9999
      targetPort: 9999

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: chat-app-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chat-app
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 80

---
# Auth-Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: chat-app-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              value: auth-service
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
---
# Auth-Service Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: chat-app
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081

---
# Chat-Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      serviceAccountName: chat-service-admin-reader
      containers:
        - name: chat-service
          image: chat-app-chat-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_APPLICATION_NAME
              value: chat-service
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
            - name: APP_WEBSOCKET_REDIS_ENABLED
              value: "true"
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: APP_ADMIN_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_ADMIN_AUTH_EMAIL
              value: admin@test.com
            - name: APP_ADMIN_AUTH_PASSWORD
              value: "123456"
---
# Chat-Service Service
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: chat-app
spec:
  selector:
    app: chat-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chat-app
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# Profile-Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
          image: chat-app-profile-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_APPLICATION_NAME
              value: profile-service
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
---
# Profile-Service Service
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: chat-app
spec:
  selector:
    app: profile-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083

---
# MongoDB for Profiles - PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-profiles-pvc
  namespace: chat-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# MongoDB for Profiles Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-profiles
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-profiles
  template:
    metadata:
      labels:
        app: mongodb-profiles
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: chat-app-profiles
          volumeMounts:
            - name: storage
              mountPath: /data/db
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: mongodb-profiles-pvc
---
# MongoDB for Profiles Service
apiVersion: v1
kind: Service
metadata:
  name: mongodb-profiles
  namespace: chat-app
spec:
  selector:
    app: mongodb-profiles
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017

