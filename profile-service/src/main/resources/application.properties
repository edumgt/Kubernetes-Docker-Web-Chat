spring.application.name=profile-service

server.port=8083

server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone = http://eureka-server:8761/eureka

spring.data.mongodb.uri=mongodb://mongodb-profiles:27017/chat-app-profiles
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:local-dev-jwt-secret-change-this-please-1234}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:3600000}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
