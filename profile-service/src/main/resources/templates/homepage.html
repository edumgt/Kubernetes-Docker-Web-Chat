<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Update Profile</title>
</head>
<body>
<h1>Update Your Profile <span th:text="${username}"></span></h1>
<form th:action="@{/profile}" method="post">
  <!-- Include CSRF token if required -->
  <input type="hidden" th:name="email" th:value="${username}" />

  <div>
    <label for="displayName">Display Name:</label>
    <input type="text" id="displayName" name="displayName"
           th:value="${profile.displayName}" placeholder="Enter display name" required />
  </div>
  <div>
    <label for="profilePicUrl">Profile Picture URL (.png):</label>
    <input type="text" id="profilePicUrl" name="profilePicUrl"
           th:value="${profile.profilePicUrl}" placeholder="http://example.com/image.png" required />
  </div>
  <div>
    <button type="submit">Update Profile</button>
  </div>
</form>
</body>
</html>
