<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Real Time Chat Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"Space Grotesk"', 'sans-serif']
          },
          colors: {
            tide: '#0f766e',
            ember: '#ea580c'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="font-body min-h-screen bg-[radial-gradient(circle_at_top,_#fff7ed_0%,_#f8fafc_45%,_#ecfeff_100%)] text-slate-900">
<div class="relative min-h-screen overflow-x-hidden">
  <div class="pointer-events-none absolute -left-20 top-20 h-56 w-56 rounded-full bg-ember/20 blur-3xl"></div>
  <div class="pointer-events-none absolute right-0 top-1/3 h-72 w-72 rounded-full bg-tide/20 blur-3xl"></div>

  <header class="relative border-b border-slate-200/60 bg-white/70 backdrop-blur">
    <nav class="mx-auto flex w-full max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-8">
      <a href="/chat" class="font-display text-2xl text-slate-900">Realtime Chat</a>
      <div class="flex flex-wrap items-center gap-2">
        <a href="/chat" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Direct Messages</a>
        <a href="/chat/public" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-tide/60 hover:text-tide">Public Room</a>
        <a href="/auth/logout" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">Logout</a>
      </div>
    </nav>
  </header>

  <main class="relative mx-auto w-full max-w-6xl px-4 py-8 sm:px-8 sm:py-10">
    <section class="mx-auto max-w-2xl rounded-3xl border border-white/70 bg-white/85 p-6 shadow-xl shadow-slate-300/40 backdrop-blur sm:p-8">
      <p class="text-xs font-semibold uppercase tracking-[0.13em] text-tide">Profile Settings</p>
      <h1 class="mt-2 font-display text-3xl text-slate-900 sm:text-4xl">Edit Your Profile</h1>
      <p class="mt-3 text-sm leading-6 text-slate-600">
        저장 후 채팅 화면에서 표시 이름과 프로필 이미지가 바로 반영됩니다.
      </p>

      <form th:action="@{/profile}" method="post" class="mt-8 space-y-6">
        <input type="hidden" th:name="email" th:value="${username}" />

        <div>
          <label for="displayName" class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Display Name</label>
          <input
                  type="text"
                  id="displayName"
                  name="displayName"
                  th:value="${profile.displayName}"
                  required
                  class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-tide/70 focus:ring-2 focus:ring-tide/20"
          >
        </div>

        <div>
          <label for="profilePicUrl" class="mb-2 block text-xs font-semibold uppercase tracking-[0.12em] text-slate-500">Profile Image URL</label>
          <div class="grid gap-4 sm:grid-cols-[auto_1fr] sm:items-center">
            <img
                    th:src="${profile.profilePicUrl != null && !profile.profilePicUrl.isEmpty() ? profile.profilePicUrl : 'https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg'}"
                    alt="Profile Picture"
                    id="profilePicPreview"
                    class="h-24 w-24 rounded-2xl object-cover ring-4 ring-slate-100"
            >
            <input
                    type="url"
                    id="profilePicUrl"
                    name="profilePicUrl"
                    th:value="${profile.profilePicUrl}"
                    required
                    class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-tide/70 focus:ring-2 focus:ring-tide/20"
            >
          </div>
        </div>

        <button type="submit" class="w-full rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">
          Save Changes
        </button>
      </form>
    </section>
  </main>
</div>

<script>
  const picInput = document.getElementById("profilePicUrl");
  const picPreview = document.getElementById("profilePicPreview");
  const fallbackImage = "https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg";

  if (picInput && picPreview) {
    picInput.addEventListener("input", () => {
      picPreview.src = picInput.value || fallbackImage;
    });
  }
</script>
</body>
</html>
