<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Profile - Real Time Chat Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-pic-preview {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #ccc;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/chat">Real Time Chat Application</a>

    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/chat/public">Public Chat</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/profile">Profile</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-light text-primary ms-2" href="/auth/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <h2 class="fw-bold mb-4 text-center">Edit Profile</h2>

      <form th:action="@{/profile}" method="post">
        <!-- Hidden email field -->
        <input type="hidden" th:name="email" th:value="${username}" />

        <!-- Display Name -->
        <div class="mb-3">
          <label for="displayName" class="form-label">Display Name</label>
          <input type="text" class="form-control" id="displayName" name="displayName"
                 th:value="${profile.displayName}" required>
        </div>

        <!-- Profile Picture Section -->
        <div class="mb-4">
          <label for="profilePicUrl" class="form-label">Profile Picture</label>
          <div class="d-flex align-items-center gap-3">
            <img
                    th:src="${profile.profilePicUrl != null && !profile.profilePicUrl.isEmpty() ? profile.profilePicUrl : 'https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg'}"
                    alt="Profile Picture"
                    class="profile-pic-preview"
                    id="profilePicPreview"
            >
            <input type="url" class="form-control" id="profilePicUrl" name="profilePicUrl"
                   th:value="${profile.profilePicUrl}" required>
          </div>
        </div>

        <!-- Submit -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>

    </div>
  </div>
</div>

<!-- Optional JS to live-preview updated URL -->
<script>
  const picInput = document.getElementById("profilePicUrl");
  const picPreview = document.getElementById("profilePicPreview");

  picInput.addEventListener("input", () => {
    picPreview.src = picInput.value || "https://media.pitchfork.com/photos/5c7d4c1b4101df3df85c41e5/1:1/w_800,h_800,c_limit/Dababy_BabyOnBaby.jpg";
  });
</script>

</body>
</html>
