networks:
  microservices-net:
    driver: bridge


services:
  eureka-server:
    build: /eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "wget", "--spider","-q", "http://localhost:8761" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api-gateway:
    build: /api-gateway
    container_name: api-gateway
    ports:
      - "9999:9999"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  auth-service:
    build: /oauth
    container_name: auth-service
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  chat-service:
    build: /chat-service
    container_name: chat-service
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  profile-service:
    build: /profile-service
    container_name: profile-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  mongodb-profiles:
    image: mongo:latest
    container_name: mongodb-profiles
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-profiles
    volumes:
      - mongodb_profiles_data:/data/db
    networks:
      - microservices-net
    restart: always

  mongodb-users:
    image: mongo:latest
    container_name: mongodb-users
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-users
    volumes:
      - mongodb_users_data:/data/db
    networks:
      - microservices-net
    restart: always

  mongodb-messages:
    image: mongo:latest
    container_name: mongodb-messages
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-messages
    volumes:
      - mongodb_messages_data:/data/db
    networks:
      - microservices-net
    restart: always

volumes:
  mongodb_profiles_data:
  mongodb_users_data:
  mongodb_messages_data: