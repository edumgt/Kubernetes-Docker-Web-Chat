networks:
  microservices-net:
    driver: bridge


services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD", "wget", "--spider","-q", "http://localhost:8761" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9999:9999"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    networks:
      - microservices-net
    depends_on:
      - api-gateway
    restart: always

  auth-service:
    build: ./oauth
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy-client-id}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy-client-secret}
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  chat-service:
    build: ./chat-service
    container_name: chat-service
    ports:
      - "8082:8082"
    environment:
      APP_WEBSOCKET_REDIS_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  profile-service:
    build: ./profile-service
    container_name: profile-service
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: always

  mongodb-profiles:
    image: mongo:latest
    container_name: mongodb-profiles
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-profiles
    volumes:
      - mongodb_profiles_data:/data/db
    networks:
      - microservices-net
    restart: always

  mongodb-users:
    image: mongo:latest
    container_name: mongodb-users
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-users
    volumes:
      - mongodb_users_data:/data/db
    networks:
      - microservices-net
    restart: always

  mongodb-messages:
    image: mongo:latest
    container_name: mongodb-messages
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_DATABASE: chat-app-messages
    volumes:
      - mongodb_messages_data:/data/db
    networks:
      - microservices-net
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservices-net
    restart: always

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - microservices-net
    depends_on:
      - eureka-server
      - api-gateway
      - auth-service
      - chat-service
      - profile-service
    restart: always

volumes:
  mongodb_profiles_data:
  mongodb_users_data:
  mongodb_messages_data:
