name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eureka-server
            image: chat-app-eureka-server
          - service: api-gateway
            image: chat-app-api-gateway
          - service: oauth
            image: chat-app-auth-service
          - service: chat-service
            image: chat-app-chat-service
          - service: profile-service
            image: chat-app-profile-service
          - service: frontend
            image: chat-app-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Kubernetes Docker Web Chat - ${{ matrix.service }}
            org.opencontainers.image.source=https://github.com/edumgt/Kubernetes-Docker-Web-Chat
            org.opencontainers.image.url=https://github.com/edumgt/Kubernetes-Docker-Web-Chat
            org.opencontainers.image.documentation=https://github.com/edumgt/Kubernetes-Docker-Web-Chat#readme
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-smoke-check:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Deployment note
        run: |
          echo "Connect this job to your deployment target (Kubernetes/VM) and run smoke tests."
          echo "Example smoke target: /actuator/health, /chat/me"
