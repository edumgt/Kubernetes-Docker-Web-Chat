name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [eureka-server, api-gateway, oauth, chat-service, profile-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make wrapper executable
        run: chmod +x ./${{ matrix.service }}/mvnw

      - name: Run tests
        run: ./${{ matrix.service }}/mvnw -f ./${{ matrix.service }}/pom.xml test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build SPA
        run: npm run build

