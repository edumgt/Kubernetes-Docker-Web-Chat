<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Chat Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fraunces', 'serif'],
                        body: ['"Space Grotesk"', 'sans-serif']
                    },
                    colors: {
                        ink: '#101828',
                        clay: '#f6efe4',
                        ember: '#ea580c',
                        tide: '#0f766e',
                        cloud: '#ecfeff'
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @keyframes drift {
            0% { transform: translateY(0px) scale(1); opacity: 0.9; }
            50% { transform: translateY(-10px) scale(1.03); opacity: 1; }
            100% { transform: translateY(0px) scale(1); opacity: 0.9; }
        }
        .drift {
            animation: drift 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-body min-h-screen bg-[radial-gradient(circle_at_top,_#fff7ed_0%,_#f8fafc_45%,_#ecfeff_100%)] text-ink">
<div class="relative min-h-screen overflow-hidden">
    <div class="pointer-events-none absolute -left-20 top-16 h-56 w-56 rounded-full bg-ember/20 blur-3xl drift"></div>
    <div class="pointer-events-none absolute right-0 top-1/3 h-72 w-72 rounded-full bg-tide/20 blur-3xl drift" style="animation-delay: 1.2s;"></div>

    <main class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-4 py-12 sm:px-8">
        <section class="w-full max-w-md rounded-3xl border border-white/70 bg-white/80 p-8 shadow-2xl shadow-slate-200/70 backdrop-blur sm:p-10">
            <p class="mb-3 inline-flex items-center gap-2 rounded-full bg-clay px-3 py-1 text-xs font-semibold uppercase tracking-[0.15em] text-slate-700">
                OAuth Gateway
            </p>
            <h1 class="font-display text-3xl leading-tight text-slate-900 sm:text-4xl">Real Time Chat</h1>
            <p class="mt-3 text-sm leading-6 text-slate-600 sm:text-base">
                Google 계정으로 로그인하고 공개/개인 채팅을 바로 시작하세요.
            </p>

            <a th:href="@{/oauth2/authorization/google}"
               class="group mt-8 flex w-full items-center justify-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-800 transition hover:-translate-y-0.5 hover:border-tide/50 hover:bg-cloud hover:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-tide">
                <img
                        src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png"
                        alt="Google"
                        class="h-6 w-6 rounded-full"
                >
                <span>Sign In With Google</span>
            </a>

            <div class="mt-8 rounded-2xl bg-slate-950 px-4 py-3 text-xs leading-5 text-slate-200">
                인증 후 Gateway(<code class="font-semibold text-amber-300">:9999</code>)를 통해 Chat/Profile 서비스로 이동합니다.
            </div>
        </section>
    </main>
</div>
</body>
</html>
