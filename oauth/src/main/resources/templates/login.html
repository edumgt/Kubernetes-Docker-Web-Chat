<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Real Time Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .google-btn {
            border: 1px solid #ddd;
            background-color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .google-btn:hover {
            background-color: #f0f0f0;
        }
        .google-icon {
            height: 24px;
            width: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4 bg-white p-5 rounded shadow">
            <h2 class="fw-bold mb-4">Real Time Chat Application</h2>

            <a th:href="@{/oauth2/authorization/google}" class="google-btn">
                <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" alt="Google Logo" class="google-icon">
                Sign in with Google
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
