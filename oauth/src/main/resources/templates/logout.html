<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Real Time Chat Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fraunces', 'serif'],
                        body: ['"Space Grotesk"', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="font-body min-h-screen bg-[radial-gradient(circle_at_top,_#ecfeff_0%,_#f8fafc_50%,_#fff7ed_100%)] text-slate-900">
<main class="mx-auto flex min-h-screen max-w-4xl items-center justify-center px-4">
    <section class="w-full max-w-md rounded-3xl border border-white/70 bg-white/85 p-8 text-center shadow-2xl shadow-slate-200/70 backdrop-blur sm:p-10">
        <p class="mb-3 inline-block rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold uppercase tracking-[0.12em] text-slate-100">
            Session Closed
        </p>
        <h1 class="font-display text-3xl sm:text-4xl">Logged Out</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600 sm:text-base">
            안전하게 로그아웃되었습니다. 다시 로그인하면 채팅으로 즉시 이동합니다.
        </p>

        <a th:href="@{/login}"
           class="mt-8 inline-flex w-full items-center justify-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-slate-800 hover:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">
            Return To Login
        </a>
    </section>
</main>
</body>
</html>
