spring.application.name=auth-service

spring.data.mongodb.uri=mongodb://mongodb-users:27017/chat-app-users

server.servlet.context-path=/auth

server.port=8081
#oauth2client

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH_REDIRECT_URI:http://localhost:9999/auth/login/oauth2/code/google}

#TODO: remove later
spring.thymeleaf.cache=false

app.seed.test-users.enabled=true
app.auth.success-redirect-uri=${APP_AUTH_SUCCESS_REDIRECT_URI:http://localhost:9999/chat}
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:local-dev-jwt-secret-change-this-please-1234}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:3600000}
app.security.cookie.secure=${APP_SECURITY_COOKIE_SECURE:false}
app.security.cookie.same-site=${APP_SECURITY_COOKIE_SAME_SITE:Lax}

server.forward-headers-strategy=framework

#eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=1.0

logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]
